services:
  prom_tigo:
    build: .
    container_name: prom_tigo_local
    restart: unless-stopped
    ports:
      - "10111:10111"
    environment:
      TIGO_MODE: "local"
      TIGO_LOCAL_HOST: "${TIGO_LOCAL_HOST}"
      TIGO_LOCAL_USERNAME: "${TIGO_LOCAL_USERNAME:-Tigo}"
      TIGO_LOCAL_PASSWORD: "${TIGO_LOCAL_PASSWORD:-$olar}"
      TIGO_LOCAL_TZ_OFFSET_SECONDS: "${TIGO_LOCAL_TZ_OFFSET_SECONDS:-0}"
      TIGO_LOCAL_RAW_TEMP_VARIANTS: "${TIGO_LOCAL_RAW_TEMP_VARIANTS:-false}"
      POLL_INTERVAL_SECONDS: "60"
      LISTEN_PORT: "10111"
      LOG_LEVEL: "INFO"
      TIGO_TIMEOUT_SECONDS: "30"
      TOPOLOGY_REFRESH_INTERVAL_POLLS: "10"
      PANEL_TELEMETRY_WINDOW_MINUTES: "15"
      SOURCE_STALE_AFTER_SECONDS: "900"
      PANEL_STALE_AFTER_SECONDS: "900"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
